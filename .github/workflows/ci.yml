name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Check formatting
        run: xcrun swift-format lint --strict -r Sources/ Tests/ Examples/
